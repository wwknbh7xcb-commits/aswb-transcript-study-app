<!DOCTYPE html>
<html>
<head>
  <title>ASWB Study App</title>
</head>

<body>
  <h1>ASWB Transcript Study App</h1>

  <div id="content">Loading...</div>

  <script>
    <script>
fetch('/aswb-transcript-study-app/transcripts/studyContent.json')
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById('content');
    container.innerHTML = '';

    data.forEach(section => {
      const div = document.createElement('div');
      div.style.marginBottom = '30px';
      div.style.padding = '15px';
      div.style.border = '1px solid #ccc';
      div.style.borderRadius = '10px';

      let flashcardsHTML = '';
      if (section.flashcards) {
        flashcardsHTML = section.flashcards.map(card => `
          <div style="margin-top:10px;">
            <strong>Q:</strong> ${card.front}<br>
            <strong>A:</strong> ${card.back}
          </div>
        `).join('');
      }

      let quizHTML = '';
      if (section.quiz) {
        quizHTML = section.quiz.map(q => `
          <div style="margin-top:10px;">
            <strong>Quiz:</strong> ${q.question}<br>
            <em>Answer:</em> ${q.answer}<br>
            <small>${q.rationale}</small>
          </div>
        `).join('');
      }

      div.innerHTML = `
        <h2>${section.title}</h2>
        <p>${section.summary}</p>

        <ul>
          ${section.keyPoints.map(p => `<li>${p}</li>`).join('')}
        </ul>

        <h4>Flashcards</h4>
        ${flashcardsHTML}

        <h4>Quiz</h4>
        ${quizHTML}
      `;

      container.appendChild(div);
    });
  })
  .catch(() => {
    document.getElementById('content').innerText = "Error loading study content";
  });
</script>
  </script>

</body>
</html>

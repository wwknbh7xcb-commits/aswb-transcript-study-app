<!DOCTYPE html>
<html>
<head>
  <title>ASWB Study App</title>
</head>

<body>

<h1>ASWB Transcript Study App</h1>
<div id="content">Loading...</div>

<script>
fetch('/aswb-transcript-study-app/transcripts/studyContent.json')
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById('content');
    container.innerHTML = '';

    data.forEach(section => {
      const div = document.createElement('div');
      div.style.marginBottom = '30px';
      div.style.padding = '15px';
      div.style.border = '1px solid #ccc';
      div.style.borderRadius = '10px';

      let flashcardsHTML = '';

      if (section.flashcards) {
        flashcardsHTML = '<h3>Flashcards</h3>';

        section.flashcards.forEach(card => {
          flashcardsHTML += `
            <div style="margin-top:10px;">
              <strong>Q:</strong> ${card.front}<br>
              <button onclick="this.nextElementSibling.style.display='block'">Show Answer</button>
              <div style="display:none;">
                <strong>A:</strong> ${card.back}
              </div>
            </div>
          `;
        });
      }

      div.innerHTML = `
        <h2>${section.title}</h2>
        <p>${section.summary}</p>
        ${flashcardsHTML}
      `;

      container.appendChild(div);
    });
  })
  .catch(err => {
    document.getElementById('content').innerText = "Error loading study content";
    console.error(err);
  });
</script>

</body>
</html>

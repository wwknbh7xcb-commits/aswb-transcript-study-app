<!DOCTYPE html>
<html>
<head>
  <title>ASWB Study App</title>
</head>

<body>

<h1>ASWB Transcript Study App</h1>
<div id="content">Loading...</div>

<script>
fetch('transcripts/studyContent.json')
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById('content');
    container.innerHTML = '';

    data.forEach(section => {
      const div = document.createElement('div');
      div.style.marginBottom = '30px';
      div.style.padding = '15px';
      div.style.border = '1px solid #ccc';
      div.style.borderRadius = '10px';

      div.innerHTML = `
  <h2>${section.title}</h2>
  <p>${section.summary}</p>

  ${section.flashcards ? `
    <h3>Flashcards</h3>
    ${section.flashcards.map(card => `
      <div style="margin-top:10px; padding:10px; border:1px solid #aaa; border-radius:8px;">
        <strong>Q:</strong> ${card.front}<br>
        <button onclick="this.nextElementSibling.style.display='block'">Show Answer</button>
        <div style="display:none; margin-top:5px;">
          <strong>A:</strong> ${card.back}
        </div>
      </div>
    `).join('')}
  ` : ''}
`;
      `;

      container.appendChild(div);
    });
  })
  .catch(() => {
    document.getElementById('content').innerText = "Error loading study content";
  });
</script>

</body>
</html>

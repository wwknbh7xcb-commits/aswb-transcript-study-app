<!DOCTYPE html>
<html>
<head>
  <title>ASWB Study App</title>
</head>

<body>
  <h1>ASWB Transcript Study App</h1>

  <div id="content">Loading...</div>

  <script>
    fetch('transcripts/studyContent.json')
      .then(res => res.json())
      .then(data => {
        const container = document.getElementById('content');
        container.innerHTML = '';

        data.forEach(section => {
          const div = document.createElement('div');
          div.style.marginBottom = '20px';

          div.innerHTML = `
  <h2>${section.title}</h2>
  <p>${section.summary}</p>
`;

          container.appendChild(div);
        });
      })
      .catch(() => {
        document.getElementById('content').innerText = "Error loading study content";
      });
  </script>

</body>
</html>
